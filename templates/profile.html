<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    {% load static %}

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 2rem;
        }

        .profile-card {
            background: #13131a;
            border: 1px solid #2a2a35;
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .profile-header {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        .user-info h2 {
            margin-bottom: 0.5rem;
        }

        .user-info p {
            margin: 4px 0;
            color: #9ca3af;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-logout {
            background: #1f2937;
            color: #fff;
        }

        .btn-post {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
        }

        .btn:hover {
            opacity: 0.9;
        }

        a {
            text-decoration: none;
        }

        /* FORMULÁRIO */
        .post-form {
            background: #13131a;
            border: 1px solid #2a2a35;
            border-radius: 20px;
            padding: 2rem;
        }

        .post-form input,
        .post-form textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            border: 1px solid #2a2a35;
            background: #0d0d12;
            color: #fff;
        }

        .post-form textarea {
            min-height: 120px;
            resize: none;
        }

        .post-form button {
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- PERFIL -->
        <div class="profile-card">

            <div class="profile-header">

                <div class="avatar">
                    {{ user.username|first|upper }}
                </div>

                <div class="user-info">
                    <h2>{{ user.username }}</h2>
                    <p>Email: {{ user.email }}</p>

                    {% if user.profile %}
                    <p>Setor: {{ user.profile.setor }}</p>
                    {% else %}
                    <p>Setor: Não informado</p>
                    {% endif %}
                </div>

            </div>

            <div class="actions">
                <a href="/logout/">
                    <button class="btn btn-logout">Sair</button>
                </a>
            </div>

        </div>

        <!-- FORM DE POST -->
        <form method="POST" class="post-form">
            {% csrf_token %}

            <input type="text" name="titulo" placeholder="Título do post" required>

            <textarea name="conteudo" placeholder="Escreva algo..." required></textarea>

            <button type="submit" class="btn btn-post">
                Publicar
            </button>
        </form>

    </div>

</body>

</html>
