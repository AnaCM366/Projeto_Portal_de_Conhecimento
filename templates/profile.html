<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Perfil</title>

    {% load static %}

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
        }

        .container {
            max-width: 800px;
            margin: 100px auto;
            padding: 2rem;
        }

        .profile-card {
            background: #13131a;
            border: 1px solid #2a2a35;
            border-radius: 20px;
            padding: 2rem;
        }

        .profile-header {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        .info p {
            margin: 5px 0;
            color: #9ca3af;
        }

        .buttons {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-logout {
            background: #1f2937;
            color: #fff;
        }

        .btn-post {
            background: #7c3aed;
            color: #fff;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Perfil</h1>

        <div class="profile-card">

            <div class="profile-header">
                <div class="avatar">
                    {{ user.username|first|upper }}
                </div>

                <div class="info">
                    <p><strong>Nome:</strong> {{ user.username }}</p>
                    <p><strong>Email:</strong> {{ user.email }}</p>
                    <p><strong>Setor:</strong> {{ user.profile.setor }}</p>
                </div>
            </div>

            <div class="buttons">
                <a href="/logout/">
                    <button class="btn btn-logout">Sair do Perfil</button>
                </a>

                <a href="/create-post/">
                    <button class="btn btn-post">Publicar</button>
                </a>
            </div>

        </div>

    </div>

</body>

</html>
